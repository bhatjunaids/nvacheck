<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIPUN Day-wise District Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans',sans-serif;background:#f5f6f8;color:#1a1a1a;font-size:13px}

.top{background:#111;color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.top h1{font-size:17px;font-weight:700}
.top p{font-size:11px;color:#888}

/* controls */
.bar{display:flex;gap:8px;align-items:center;padding:10px 24px;background:#fff;border-bottom:1px solid #ddd;flex-wrap:wrap}
.bar label{font-size:11px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.bar select,.bar input{font:inherit;font-size:12px;padding:5px 10px;border:1px solid #ccc;border-radius:5px;background:#fff;outline:none}
.bar select:focus,.bar input:focus{border-color:#2563eb}
.bar .sep{color:#bbb;font-size:11px}
.bar .pipe{width:1px;height:22px;background:#ddd;margin:0 6px}
.btn{font:inherit;font-size:11px;font-weight:600;padding:5px 14px;border-radius:5px;border:1px solid #ccc;background:#fff;cursor:pointer;transition:all .15s}
.btn:hover{background:#f0f0f0}
.btn.on{background:#111;color:#fff;border-color:#111}

/* tabs */
.tabs{display:flex;gap:0;background:#fff;border-bottom:1px solid #ddd;padding:0 24px}
.tab{padding:10px 18px;font-size:12px;font-weight:600;color:#888;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:#333}
.tab.on{color:#111;border-bottom-color:#111}

.wrap{padding:16px 24px}
.panel{display:none}.panel.on{display:block}

/* table */
.tbl-wrap{overflow:auto;border:1px solid #ddd;border-radius:8px;background:#fff;max-height:calc(100vh - 260px)}
table{width:100%;border-collapse:collapse;white-space:nowrap;font-size:12px}
thead{position:sticky;top:0;z-index:10}
.grp th{background:#222;color:#777;font-size:9px;padding:3px 10px;text-align:center;letter-spacing:.7px;text-transform:uppercase;border:none}
.grp .lft{text-align:left}
.grp .c-all{color:#e97a1f}
.grp .c-wo{color:#0ea5c7}
.grp .c-d{color:#a78bfa}
thead .cols th{
  background:#f8f8f8;color:#555;padding:7px 10px;text-align:right;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;
  cursor:pointer;user-select:none;border-bottom:2px solid #ddd;
}
thead .cols th:first-child{text-align:left}
thead .cols th:hover{color:#111}
thead .cols th.s{color:#2563eb}
thead .cols th .a{font-size:8px;margin-left:2px;opacity:.4}
thead .cols th.s .a{opacity:1}

tbody td{padding:6px 10px;border-bottom:1px solid #f0f0f0;text-align:right}
tbody td:first-child{text-align:left;font-weight:600;position:sticky;left:0;background:#fff;z-index:5;border-right:1px solid #eee}
tbody tr:hover td{background:#f7f8ff}
tbody tr:hover td:first-child{background:#f7f8ff}
tbody tr.dpmu td{background:#fffbeb}
tbody tr.dpmu:hover td{background:#fff5d4}
tbody tr.dpmu td:first-child{background:#fffbeb;border-left:3px solid #f59e0b}
tbody tr.dpmu:hover td:first-child{background:#fff5d4}

.state-row td{background:#eef !important;font-weight:700;border-top:2px solid #bbb}
.state-row td:first-child{background:#eef !important}
.dpmu-row td{background:#fffbeb !important;font-weight:700;border-top:1px solid #e0d6a8}
.dpmu-row td:first-child{background:#fffbeb !important}

.pct{font-weight:700}
.pos{color:#16a34a;font-weight:700}
.neg{color:#dc2626;font-weight:700}
.zero{color:#aaa}
.mono{font-family:'IBM Plex Mono',monospace;font-size:11.5px}

/* Aggregate cards */
.agg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:18px}
.agg{background:#fff;border:1px solid #ddd;border-radius:8px;padding:14px 16px}
.agg .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#888;font-weight:600;margin-bottom:4px}
.agg .val{font-size:26px;font-weight:700;line-height:1}
.agg .sub{font-size:11px;color:#999;margin-top:4px}

/* Insights */
.insights{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
@media(max-width:800px){.insights{grid-template-columns:1fr}}
.insight-card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:14px 16px}
.insight-card h4{font-size:12px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.insight-card .icon{font-size:16px}
.insight-list{font-size:11.5px;line-height:1.7}
.insight-list .row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #f5f5f5}
.insight-list .row:last-child{border:none}
.insight-list .nm{font-weight:600}
.tag-dpmu{font-size:9px;background:#fef3c7;color:#92400e;padding:1px 5px;border-radius:3px;font-weight:600;margin-left:4px}
</style>
</head>

<div class="top">

  <div class="pipe"></div>

</div>

<div class="tabs">
  <div class="tab on" data-t="table">Aggregate Summary</div>

</div>

//  DAY-WISE TABLE
// ═══════════════════════════════════════
let sortKey='a_pct',sortAsc=false;
const COLS=[
  {key:'a_ts',label:'Schools'},
  {key:'a_ns',label:'NIPUN'},
  {key:'a_pct',label:'NIPUN %'},
  {key:'w_ts',label:'Schools'},
  {key:'w_ns',label:'NIPUN'},
  {key:'w_pct',label:'NIPUN %'},
  {key:'delta',label:'Δ pp'},
];

function renderTable(){
  const dists=getFilteredDists();
  const dates=getDateRange();

  // aggregate each district across selected date range
  let rows=dists.map(dist=>{
    let ats=0,ans=0,wts=0,wns=0;
    dates.forEach(d=>{
      const a=iA[dist+'|'+d]; if(a){ats+=a.ts;ans+=a.ns}
      const w=iW[dist+'|'+d]; if(w){wts+=w.ts;wns+=w.ns}
    });
    const apct=ats?ans/ats:0, wpct=wts?wns/wts:0;
    return{dist,a_ts:ats,a_ns:ans,a_pct:apct,w_ts:wts,w_ns:wns,w_pct:wpct,delta:+((wpct-apct)*100).toFixed(1),hasData:ats>0||wts>0};
  }).filter(r=>r.hasData);

  rows.sort((a,b)=>{
    let va=a[sortKey],vb=b[sortKey];
    if(typeof va==='string')return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
    return sortAsc?va-vb:vb-va;
  });

  // state totals
  const stAts=rows.reduce((s,r)=>s+r.a_ts,0),stAns=rows.reduce((s,r)=>s+r.a_ns,0);
  const stWts=rows.reduce((s,r)=>s+r.w_ts,0),stWns=rows.reduce((s,r)=>s+r.w_ns,0);
  const stApct=stAts?stAns/stAts:0, stWpct=stWts?stWns/stWts:0;
  const stDelta=+((stWpct-stApct)*100).toFixed(1);

  // DPMU totals
  const dpmuRows=rows.filter(r=>dpmuSet.has(r.dist));
  const dmAts=dpmuRows.reduce((s,r)=>s+r.a_ts,0),dmAns=dpmuRows.reduce((s,r)=>s+r.a_ns,0);
  const dmWts=dpmuRows.reduce((s,r)=>s+r.w_ts,0),dmWns=dpmuRows.reduce((s,r)=>s+r.w_ns,0);
  const dmApct=dmAts?dmAns/dmAts:0, dmWpct=dmWts?dmWns/dmWts:0;
  const dmDelta=+((dmWpct-dmApct)*100).toFixed(1);

  const dateLabel=dates.length===1?fd(dates[0]):`${fd(dates[0])} → ${fd(dates[dates.length-1])} (${dates.length}d)`;

  let html=`<div style="font-size:11px;color:#666;margin-bottom:8px;font-weight:500">Showing: ${dateLabel} · ${rows.length} districts</div>
  <div class="tbl-wrap"><table>
    <thead>
      <tr class="grp">
        <th class="lft" rowspan="2" style="min-width:150px">District</th>
        <th colspan="3" class="c-all">All Competencies</th>
        <th colspan="3" class="c-wo">Without Writing</th>
        <th colspan="1" class="c-d">Delta</th>
      </tr>
      <tr class="cols" id="colHdr"></tr>
    </thead><tbody>`;

  // state row
  html+=summaryRow('STATE TOTAL','state-row',stAts,stAns,stApct,stWts,stWns,stWpct,stDelta);
  // dpmu row if showing all
  if(filter==='all'&&dpmuRows.length>0)
    html+=summaryRow('DPMU DISTRICTS (10)','dpmu-row',dmAts,dmAns,dmApct,dmWts,dmWns,dmWpct,dmDelta);

  rows.forEach(r=>{
    const isDpmu=dpmuSet.has(r.dist);
    html+=`<tr class="${isDpmu?'dpmu':''}">
      <td>${r.dist}${isDpmu?'<span class="tag-dpmu">DPMU</span>':''}</td>
      <td class="mono">${r.a_ts.toLocaleString()}</td>
      <td class="mono">${r.a_ns.toLocaleString()}</td>
      <td class="pct mono">${(r.a_pct*100).toFixed(1)}%</td>
      <td class="mono">${r.w_ts.toLocaleString()}</td>
      <td class="mono">${r.w_ns.toLocaleString()}</td>
      <td class="pct mono">${(r.w_pct*100).toFixed(1)}%</td>
      <td class="mono ${r.delta>0?'pos':r.delta<0?'neg':'zero'}">${r.delta>0?'+':''}${r.delta.toFixed(1)}</td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;

  document.getElementById('p-table').innerHTML=html;

  // column sort headers
  const colHdr=document.getElementById('colHdr');
  colHdr.innerHTML=COLS.map(c=>{
    const on=sortKey===c.key;
    return`<th class="${on?'s':''}" data-k="${c.key}">${c.label}<span class="a">${on?(sortAsc?'▲':'▼'):'⇅'}</span></th>`;
  }).join('');
  colHdr.querySelectorAll('th').forEach(th=>{
    th.onclick=()=>{
      const k=th.dataset.k;
      if(sortKey===k)sortAsc=!sortAsc;else{sortKey=k;sortAsc=false}
      renderTable();
    };
  });
}

function summaryRow(label,cls,ats,ans,apct,wts,wns,wpct,delta){
  return`<tr class="${cls}">
    <td>${label}</td>
    <td class="mono">${ats.toLocaleString()}</td><td class="mono">${ans.toLocaleString()}</td><td class="pct mono">${(apct*100).toFixed(1)}%</td>
    <td class="mono">${wts.toLocaleString()}</td><td class="mono">${wns.toLocaleString()}</td><td class="pct mono">${(wpct*100).toFixed(1)}%</td>
    <td class="mono ${delta>0?'pos':delta<0?'neg':'zero'}">${delta>0?'+':''}${delta.toFixed(1)}</td>
  </tr>`;
}

function renderAgg(){
  const dists=getFilteredDists();
  const dates=getDateRange();

  // per-day state-level for the range
  const dayData=dates.map(d=>{
    let ats=0,ans=0,wts=0,wns=0;
    dists.forEach(dist=>{
      const a=iA[dist+'|'+d];if(a){ats+=a.ts;ans+=a.ns}
      const w=iW[dist+'|'+d];if(w){wts+=w.ts;wns+=w.ns}
    });
    return{d,ats,ans,apct:ats?ans/ats:0,wts,wns,wpct:wts?wns/wts:0};
  });

  const totAts=dayData.reduce((s,r)=>s+r.ats,0),totAns=dayData.reduce((s,r)=>s+r.ans,0);
  const totWts=dayData.reduce((s,r)=>s+r.wts,0),totWns=dayData.reduce((s,r)=>s+r.wns,0);
  const avgApct=dayData.reduce((s,r)=>s+r.apct,0)/dayData.length;
  const avgWpct=dayData.reduce((s,r)=>s+r.wpct,0)/dayData.length;
  const bestDayA=dayData.reduce((b,r)=>r.apct>b.apct?r:b,dayData[0]);
  const bestDayW=dayData.reduce((b,r)=>r.wpct>b.wpct?r:b,dayData[0]);
  const worstDayA=dayData.reduce((b,r)=>r.apct<b.apct?r:b,dayData[0]);

  let html=`
  <div class="agg-grid">
    <div class="agg"><div class="lbl">Avg NIPUN % (All)</div><div class="val" style="color:#d4440f">${(avgApct*100).toFixed(1)}%</div><div class="sub">${dates.length} days · ${dists.length} districts</div></div>
    <div class="agg"><div class="lbl">Avg NIPUN % (W/o Writing)</div><div class="val" style="color:#0891b2">${(avgWpct*100).toFixed(1)}%</div><div class="sub">Across same period</div></div>
    <div class="agg"><div class="lbl">Avg Writing Impact</div><div class="val" style="color:#7c3aed">+${((avgWpct-avgApct)*100).toFixed(1)}pp</div><div class="sub">Lift when writing removed</div></div>
    <div class="agg"><div class="lbl">Total Assessments (All)</div><div class="val">${totAts.toLocaleString()}</div><div class="sub">${totAns.toLocaleString()} NIPUN</div></div>
    <div class="agg"><div class="lbl">Best Day (All)</div><div class="val">${(bestDayA.apct*100).toFixed(1)}%</div><div class="sub">${fd(bestDayA.d)} · ${bestDayA.ats.toLocaleString()} schools</div></div>
    <div class="agg"><div class="lbl">Worst Day (All)</div><div class="val">${(worstDayA.apct*100).toFixed(1)}%</div><div class="sub">${fd(worstDayA.d)} · ${worstDayA.ats.toLocaleString()} schools</div></div>
  </div>`;

  // day-wise table
  html+=`<div class="tbl-wrap" style="max-height:400px"><table>
    <thead>
      <tr class="grp">
        <th class="lft" rowspan="2">Date</th>
        <th colspan="3" class="c-all">All Competencies</th>
        <th colspan="3" class="c-wo">Without Writing</th>
        <th class="c-d">Delta</th>
      </tr>
      <tr class="grp">
        <th>Schools</th><th>NIPUN</th><th>%</th>
        <th>Schools</th><th>NIPUN</th><th>%</th>
        <th>Δ pp</th>
      </tr>
    </thead><tbody>`;
  dayData.forEach(r=>{
    const delta=+((r.wpct-r.apct)*100).toFixed(1);
    html+=`<tr>
      <td style="font-weight:600">${fd(r.d)}</td>
      <td class="mono" style="text-align:right">${r.ats.toLocaleString()}</td>
      <td class="mono" style="text-align:right">${r.ans.toLocaleString()}</td>
      <td class="pct mono" style="text-align:right">${(r.apct*100).toFixed(1)}%</td>
      <td class="mono" style="text-align:right">${r.wts.toLocaleString()}</td>
      <td class="mono" style="text-align:right">${r.wns.toLocaleString()}</td>
      <td class="pct mono" style="text-align:right">${(r.wpct*100).toFixed(1)}%</td>
      <td class="mono ${delta>0?'pos':delta<0?'neg':'zero'}" style="text-align:right">${delta>0?'+':''}${delta.toFixed(1)}</td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  document.getElementById('p-agg').innerHTML=html;
}

// ═══════════════════════════════════════
//  KEY INSIGHTS
// ═══════════════════════════════════════
function renderInsights(){
  const dists=getFilteredDists();
  const dates=getDateRange();
  if(dates.length<2){document.getElementById('p-insights').innerHTML='<p style="color:#888;padding:20px">Select at least 2 dates to see insights.</p>';return}

  const first=dates[0],last=dates[dates.length-1];

  // per-district: first day vs last day
  const moves=dists.map(dist=>{
    const af=iA[dist+'|'+first],al=iA[dist+'|'+last];
    const wf=iW[dist+'|'+first],wl=iW[dist+'|'+last];
    const aPctF=af?.pct||0, aPctL=al?.pct||0;
    const wPctF=wf?.pct||0, wPctL=wl?.pct||0;
    // avg delta across range
    let sumD=0,nD=0;
    dates.forEach(d=>{
      const a=iA[dist+'|'+d],w=iW[dist+'|'+d];
      if(a&&w&&a.ts>0){sumD+=(w.pct-a.pct);nD++}
    });
    return{
      dist,
      aChange:+(( aPctL-aPctF)*100).toFixed(1),
      wChange:+(( wPctL-wPctF)*100).toFixed(1),
      aPctL, wPctL,
      avgDelta:nD?+((sumD/nD)*100).toFixed(1):0,
      isDpmu:dpmuSet.has(dist),
      hasFirst:!!(af?.ts),hasLast:!!(al?.ts)
    };
  }).filter(r=>r.hasFirst&&r.hasLast);

  // sort for various insights
  const byAJump=[...moves].sort((a,b)=>b.aChange-a.aChange);
  const byASlide=[...moves].sort((a,b)=>a.aChange-b.aChange);
  const byWJump=[...moves].sort((a,b)=>b.wChange-a.wChange);
  const byDelta=[...moves].sort((a,b)=>b.avgDelta-a.avgDelta);
  const byDeltaLow=[...moves].sort((a,b)=>a.avgDelta-b.avgDelta);
  const topAll=[...moves].sort((a,b)=>b.aPctL-a.aPctL);
  const botAll=[...moves].sort((a,b)=>a.aPctL-b.aPctL);

  // volatile: biggest absolute swing day-to-day
  const volatile=dists.map(dist=>{
    let maxSwing=0;
    for(let i=1;i<dates.length;i++){
      const prev=iA[dist+'|'+dates[i-1]],cur=iA[dist+'|'+dates[i]];
      if(prev&&cur&&prev.ts>0&&cur.ts>0){
        const sw=Math.abs(cur.pct-prev.pct)*100;
        if(sw>maxSwing)maxSwing=sw;
      }
    }
    return{dist,maxSwing:+maxSwing.toFixed(1),isDpmu:dpmuSet.has(dist)};
  }).filter(r=>r.maxSwing>0).sort((a,b)=>b.maxSwing-a.maxSwing);

  function tag(r){return r.isDpmu?'<span class="tag-dpmu">DPMU</span>':''}
  function insightList(arr,valFn,n=5){
    return arr.slice(0,n).map(r=>`<div class="row"><span class="nm">${r.dist}${tag(r)}</span><span>${valFn(r)}</span></div>`).join('');
  }

  const html=`
  <div style="font-size:11px;color:#666;margin-bottom:12px">Comparing <b>${fd(first)}</b> → <b>${fd(last)}</b> · ${moves.length} districts with data on both dates</div>
  <div class="insights">
    <div class="insight-card">
      <h4><span class="icon">🚀</span> Biggest Jumps — All Competencies</h4>
      <div class="insight-list">${insightList(byAJump,r=>`<span class="pos">+${r.aChange.toFixed(1)}pp</span>`)}</div>
    </div>
    <div class="insight-card">
      <h4><span class="icon">📉</span> Biggest Slides — All Competencies</h4>
      <div class="insight-list">${insightList(byASlide,r=>`<span class="${r.aChange<0?'neg':'zero'}">${r.aChange>0?'+':''}${r.aChange.toFixed(1)}pp</span>`)}</div>
    </div>
    <div class="insight-card">
      <h4><span class="icon">🚀</span> Biggest Jumps — W/o Writing</h4>
      <div class="insight-list">${insightList(byWJump,r=>`<span class="pos">+${r.wChange.toFixed(1)}pp</span>`)}</div>
    </div>
    <div class="insight-card">
      <h4><span class="icon">✏️</span> Highest Writing Impact (Avg Delta)</h4>
      <div class="insight-list">${insightList(byDelta,r=>`<span class="pos">+${r.avgDelta.toFixed(1)}pp</span>`)}</div>
    </div>
    <div class="insight-card">
      <h4><span class="icon">🏆</span> Top Performers — All (Latest Day)</h4>
      <div class="insight-list">${insightList(topAll,r=>`<span class="pct">${(r.aPctL*100).toFixed(1)}%</span>`)}</div>
    </div>
    <div class="insight-card">
      <h4><span class="icon">⚠️</span> Bottom Performers — All (Latest Day)</h4>
      <div class="insight-list">${insightList(botAll,r=>`<span class="pct" style="color:#dc2626">${(r.aPctL*100).toFixed(1)}%</span>`)}</div>
    </div>
    <div class="insight-card">
      <h4><span class="icon">🎢</span> Most Volatile (Biggest Day-to-Day Swing)</h4>
      <div class="insight-list">${insightList(volatile,r=>`<span style="font-weight:700">${r.maxSwing.toFixed(1)}pp</span>`)}</div>
    </div>
    <div class="insight-card">
      <h4><span class="icon">📌</span> Lowest Writing Impact</h4>
      <div class="insight-list">${insightList(byDeltaLow,r=>`<span class="${r.avgDelta<1?'neg':'zero'}">+${r.avgDelta.toFixed(1)}pp</span>`)}</div>
    </div>
  </div>`;

  document.getElementById('p-insights').innerHTML=html;
}

// wire up controls
[d1,d2,document.getElementById('search')].forEach(el=>el.addEventListener('input',renderActive));
renderTable();

</script>
